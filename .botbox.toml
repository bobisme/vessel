# Botbox project configuration
# See: https://github.com/anthropics/botbox

version = "1.0.13"
push_main = false

[project]
name = "botty"
type = ["cli"]
languages = []
default_agent = "botty-dev"
channel = "botty"

# Companion tools to enable
[tools]
bones = true
maw = true
crit = true
botbus = true
botty = true

# Code review configuration
[review]
enabled = true
reviewers = ["security"]

[agents.dev]
model = "opus"
max_loops = 20
pause = 2
timeout = 900

[agents.dev.missions]
enabled = true
max_workers = 4
max_children = 12
checkpoint_interval_sec = 30

[agents.dev.multi_lead]
enabled = true
max_leads = 3
merge_timeout_sec = 120

[agents.worker]
model = "haiku"
timeout = 600

[agents.reviewer]
model = "opus"
max_loops = 20
pause = 2
timeout = 600

# Model tier pools for load balancing
# Each tier maps to a list of "provider/model:thinking" strings
[models]
fast = [
    "anthropic/claude-haiku-4-5:low",
    "google-gemini-cli/gemini-3-flash-preview:low",
    "openai-codex/gpt-5.3-codex-spark:low",
]
balanced = [
    "anthropic/claude-sonnet-4-6:medium",
    "google-gemini-cli/gemini-3-pro-preview:medium",
    "openai-codex/gpt-5.3-codex:medium",
]
strong = [
    "anthropic/claude-opus-4-6:high",
    "openai-codex/gpt-5.3-codex:xhigh",
]
